{% extends "base.html" %}
{% block title %}Page Not Found | CreditSense{% endblock %}
{% block content %}
<div class="container error-wrap">
  <div class="error-code gradient-text">404</div>
  <h2 class="mt-2">Page Not Found</h2>
  <p class="muted mt-1" style="max-width:420px">The page you're looking for doesn't exist or may have been moved.</p>
  <div class="flex gap-2 mt-3">
    <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
    <a href="{{ url_for('contact') }}" class="btn btn-outline">Contact Support</a>
  </div>
</div>
{% endblock %}
