<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CreditSense | Premium AI Banking Platform{% endblock %}</title>
<meta name="description" content="CreditSense — an AI-powered credit card approval prediction platform built for the SmartBridge Summer Internship program.">

<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/wizard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<div id="page-loader"><img src="{{ url_for('static', filename='img/logo.svg') }}" alt="CreditSense" class="loader-mark"></div>
<div id="scroll-progress"></div>

{% include "partials/navbar.html" %}

{% for category, message in get_flashed_messages(with_categories=true) %}
  <span style="display:none" data-flash="{{ message }}" data-flash-type="{{ category }}"></span>
{% endfor %}

<main>
{% block content %}{% endblock %}
</main>

{% include "partials/footer.html" %}

<div id="toast-stack"></div>

<script src="{{ url_for('static', filename='js/vendor/chart.umd.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
